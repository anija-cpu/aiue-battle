<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>あいうえバトル</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ①ルーム画面 -->
    <div id="screenRoom">
        <h1>あいうえバトル</h1>
        <button id="createRoom">部屋を作る</button>
        <hr>
        <input id="roomInput" placeholder="部屋ID">
        <button id="joinRoom">参加</button>
        <p id="roomInfo"></p>
    </div>

    <!-- ②待機画面 -->
    <div id="screenWait" hidden>
        <h2>相手を待っています...</h2>
        <p id="waitRoomId"></p>
    </div>

    <!-- ③単語入力画面 -->
    <div id="screenInput" hidden>
        <h2>単語を入力してください</h2>
        <div class="cards">
            <input class="card" maxlength="1">
            <input class="card" maxlength="1">
            <input class="card" maxlength="1">
            <input class="card" maxlength="1">
            <input class="card" maxlength="1">
            <input class="card" maxlength="1">
            <input class="card" maxlength="1">
        </div>
        <button id="checkButton">決定</button>
        <div id="keyboardArea">
            <div id="specialKeyboard"></div>
            <div id="keyboard"></div>
        </div>
    </div>

    <!-- ④バトル画面 -->
     <div id="screenBattle" hidden>
            <h2>バトル中！</h2>
            <p>相手の単語</p>
            <div class="cards" id="battleCards"></div>
            <div id="result"></div>
            <p>自分の単語</p>
            <div class="cards" id="myCards"></div>
            <div id="keyboardArea2">
                <div id="keyboard2"></div>
            </div>
        </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>

</body>

</html>
